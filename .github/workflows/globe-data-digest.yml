name: Globe data digest

on:
  schedule:
    - cron: '0 */4 * * *' # every 4 hours — combined weather and satellite TLE
  workflow_dispatch: {}

permissions:
  contents: write

# Prevent overlapping scheduled runs from racing on direct push to main.
concurrency:
  group: globe-data-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          # fetch-depth 1 is enough for diff check against HEAD; no need for full history.

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build weather digest
        run: node scripts/weather/build-weather.mjs

      - name: Build satellite TLE digest
        run: node scripts/satellite/build-satellite.mjs

      - name: Push updates directly if changed
        run: |
          # git diff --quiet exits 1 when tracked files have modifications,
          # 0 when clean. The '!' inverts so we enter the commit path on changes.
          # Both files are tracked in git; any new file would need 'git status' check,
          # but these are long-lived (not new).
          if ! git diff --quiet -- src/data/weather.json src/data/satellite.json; then
            git config user.name "makerportal-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/weather.json src/data/satellite.json
            git commit -m "Globe data update (weather + TLE): $(date -u +%Y-%m-%dT%H:%MZ)"
            # Direct-to-main push can be rejected if main advanced since checkout
            # (e.g. a trends PR merged). Only rebase+retry on rejection so the happy
            # path stays a single push. Rebases cleanly: nothing else touches these two files.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No weather or TLE changes detected. Skipping update."
          fi
