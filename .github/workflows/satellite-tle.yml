name: Satellite TLE digest

on:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours — TLE accuracy degrades slowly, doesn't need trends' cadence
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build satellite TLE digest
        run: node scripts/satellite/build-satellite.mjs

      - name: Open review PR if TLE changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/satellite.json; then
            echo "No TLE changes — skipping PR."
            exit 0
          fi

          branch="satellite/tle-$(date +%Y-%m-%d-%H)"
          git checkout -b "$branch"
          git config user.name "makerportal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A src/data/satellite.json
          git commit -m "Satellite TLE digest: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force origin "$branch"

          if [ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" = "0" ]; then
            gh pr create \
              --title "Satellite TLE digest — $(date -u +%Y-%m-%dT%H:%MZ)" \
              --body-file satellite-tle-summary.md \
              --base main \
              --head "$branch"
          else
            gh pr edit "$branch" --body-file satellite-tle-summary.md
          fi
