name: Trend digest

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pipeline gate tests
        run: node --test scripts/trends/pipeline.test.mjs

      - name: Build trend digest
        run: node scripts/trends/build-digest.mjs
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Open review PR if trends changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/trends.json; then
            echo "No trend changes — skipping PR."
            exit 0
          fi

          branch="trends/digest-$(date +%Y-%m-%d)"
          git checkout -b "$branch"
          git config user.name "makerportal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/trends.json
          git commit -m "Trend digest: $(date +%Y-%m-%d)"
          # Force-push so a same-day re-run updates the existing digest branch/PR
          git push --force origin "$branch"

          if [ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" = "0" ]; then
            gh pr create \
              --title "Trend digest — $(date +%Y-%m-%d)" \
              --body-file trend-digest-summary.md \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch — updating body."
            gh pr edit "$branch" --body-file trend-digest-summary.md
          fi
