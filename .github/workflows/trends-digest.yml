name: Trend digest

on:
  schedule:
    # Daily 12:00 + 13:00 UTC — dual trigger mitigates GitHub's :00 thundering-herd
    # drops (seen 2026-07-20: 13:00 job never created while globe's 12:00 job did).
    # Second run is idempotent: build-digest dedupes recentSeen + porcelain check skips empty publish.
    # TODO: consider jitter like 17 12,13 * * * to avoid exact :00 rush per GitHub docs.
    - cron: '0 12,13 * * *' # 04:00/05:00 PST, 05:00/06:00 PDT — publishes that day's Signals Journal
  workflow_dispatch: {}

permissions:
  contents: write

# Prevent overlapping runs from racing on the direct push to main.
concurrency:
  group: trends-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ubuntu-latest runners stopped shipping ImageMagick; without this,
      # enrich-images.mjs skips all thumbnails (silently — digest still passes)
      - name: Install ImageMagick (og:image thumbnails)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends imagemagick

      # Gate regression tests are the automated safety net that stands in for the
      # removed human PR review (D-022) — a failure here aborts before anything publishes.
      - name: Pipeline gate tests
        run: node --test scripts/trends/pipeline.test.mjs

      - name: Build trend digest
        # Writes src/content/journal/YYYY-MM-DD.json (+ public/trends thumbnails) and
        # trend-digest-summary.md (surfaced below as the run's step summary). Writes no
        # journal file when gating leaves nothing, so an empty day never publishes.
        run: node scripts/trends/build-digest.mjs
        env:
          # 5 sources: Bluesky (auth required, else 403) + HN + GitHub + arXiv + Lobsters
          # Reddit disabled (D-023) — no API credentials.
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish that day's journal entry directly if changed
        run: |
          # Each run writes a NEW src/content/journal/YYYY-MM-DD.json, which is an
          # UNTRACKED file relative to main — `git diff` never reports untracked files,
          # so `git status --porcelain` is required to detect the new day (also catches
          # same-day re-runs and new/removed thumbnails).
          if [ -z "$(git status --porcelain -- src/content/journal/ public/trends)" ]; then
            echo "No trend changes detected. Skipping publish."
          else
            git config user.name "makerportal-bot"
            git config user.email "actions@users.noreply.github.com"
            git add -A src/content/journal/
            if [ -d public/trends ]; then git add -A public/trends; fi
            git commit -m "Signals Journal: $(date -u +%Y-%m-%d)"
            # Direct-to-main push can be rejected if main advanced since checkout
            # (e.g. a globe-data-digest run pushed). Rebase+retry only on rejection.
            git push origin main || (git pull --rebase origin main && git push origin main)
          fi

      - name: Publish step summary
        if: always()
        run: |
          # Pillar-grouped breakdown of what published this run — the "skim what
          # shipped" value the old PR body gave, now attached to the Actions run.
          if [ -f trend-digest-summary.md ]; then
            cat trend-digest-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
