name: Weather digest

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours — weather.json for the Globe tool's Weather mode
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build weather digest
        run: node scripts/weather/build-weather.mjs

      - name: Open review PR if weather changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/weather.json; then
            echo "No weather changes — skipping PR."
            exit 0
          fi

          branch="weather/digest-$(date +%Y-%m-%d-%H)"
          git checkout -b "$branch"
          git config user.name "makerportal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A src/data/weather.json
          git commit -m "Weather digest: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force origin "$branch"

          if [ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" = "0" ]; then
            gh pr create \
              --title "Weather digest — $(date -u +%Y-%m-%dT%H:%MZ)" \
              --body-file weather-digest-summary.md \
              --base main \
              --head "$branch"
          else
            gh pr edit "$branch" --body-file weather-digest-summary.md
          fi
