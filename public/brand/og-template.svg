<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MakerPortal OG">
  <defs>
    <radialGradient id="aura" cx="50%" cy="110%" r="60%">
      <stop offset="0%" stop-color="#CE445D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0F141C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#5C6E7A" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0F141C"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#aura)"/>
  <!-- portal icon large -->
  <g transform="translate(560 140)">
    <circle cx="40" cy="40" r="120" fill="#CE445D" opacity="0.12" style="filter: blur(30px)"/>
    <g transform="scale(4.2)">
      <g stroke="#CE445D" stroke-width="2.2" stroke-linecap="round">
        <line x1="16" y1="1.2" x2="16" y2="5.2"/>
        <line x1="7.8" y1="4.2" x2="10.6" y2="7.2"/>
        <line x1="24.2" y1="4.2" x2="21.4" y2="7.2"/>
      </g>
      <path d="M8 16.2V11.2C8 5.9 11.6 2.8 16 2.8C20.4 2.8 24 5.9 24 11.2V16.2H8Z" fill="#CE445D"/>
      <rect x="7" y="19.6" width="18" height="2.8" rx="1.4" fill="#E2E8F0"/>
    </g>
  </g>
  <!-- wordmark -->
  <g transform="translate(80 460)">
    <text font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="700" font-size="28" letter-spacing="0.12em" fill="white">MAKERPORTAL</text>
    <text x="1" y="56" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="600" font-size="64" letter-spacing="-0.04em" fill="white">Software with</text>
    <text x="1" y="124" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="600" font-size="64" letter-spacing="-0.04em" fill="#CE445D">a point of view.</text>
    <text x="1" y="168" font-family="SFMono-Regular, monospace" font-size="14" letter-spacing="0.18em" fill="#5C6E7A">ON-DEVICE • PRIVATE • CRAFTED IN LOS ANGELES</text>
  </g>
  <!-- badge bottom right -->
  <g transform="translate(880 520)">
    <rect width="240" height="56" rx="28" fill="#1A232E" stroke="white" stroke-opacity="0.08"/>
    <circle cx="28" cy="28" r="4" fill="#CE445D"/>
    <text x="44" y="34" font-family="SFMono-Regular, monospace" font-size="13" fill="white" letter-spacing="0.12em">makerportal.ai</text>
  </g>
</svg>
